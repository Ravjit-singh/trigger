<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trigger | Serverless Keep-Alive</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts (Inter for UI, JetBrains Mono for tech data) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script type="text/javascript">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                            glow: '#38bdf840'
                        },
                        dark: {
                            bg: '#000000',
                            card: '#0A0A0A',
                            border: '#1F1F1F'
                        }
                    },
                    animation: {
                        'spin-slow': 'spin 8s linear infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        // Dedicated sequence animations for boot loading
                        'slide-up-1': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up-2': 'slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'slide-up-3': 'slideUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '.5' },
                        }
                    }
                }
            }
        };
    </script>
    <style>
        /* Absolutely prevent horizontal scrolling and dead spaces at the root level */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
            overscroll-behavior-y: none;
            background-color: #000000;
        }

        /* Modern subtle grid background */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* Animated conic gradient border magic */
        .animated-border-box {
            position: relative;
            background: #000;
            border-radius: 1rem;
            z-index: 1;
        }
        .animated-border-box::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 1.1rem;
            background: conic-gradient(from 0deg, transparent 0%, transparent 40%, #38bdf8 50%, #818cf8 60%, transparent 100%);
            z-index: -1;
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Boot Clock Animation keyframe */
        @keyframes clockFill {
            to { stroke-dashoffset: 0; }
        }

        /* Input Autofill fix for pure black */
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #0A0A0A inset !important;
            -webkit-text-fill-color: #f3f4f6 !important;
        }
    </style>

    <!-- PWA Injected by PWA Forge -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <meta name="theme-color" content="#000000">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
</head>
<body class="bg-dark-bg min-h-[100dvh] flex items-center justify-center p-4 font-sans text-gray-300 selection:bg-brand-500/30 selection:text-white relative">

    <!-- Boot Splash Screen -->
    <div id="splashScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-dark-bg transition-opacity duration-500">
        <!-- SVG Clock Ring that fills up over exactly 1.2s -->
        <svg class="w-16 h-16 transform -rotate-90 drop-shadow-lg" viewBox="0 0 100 100">
            <!-- Background Track -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="#1F1F1F" stroke-width="6"></circle>
            <!-- Animated Filling Track -->
            <circle cx="50" cy="50" r="45" fill="none" stroke="url(#bootGradient)" stroke-width="6" stroke-dasharray="283" stroke-dashoffset="283" style="animation: clockFill 1.2s linear forwards; stroke-linecap: round;"></circle>
            <defs>
                <linearGradient id="bootGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#38bdf8"></stop>
                    <stop offset="100%" stop-color="#818cf8"></stop>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <!-- Ambient Grid & Glows locked to viewport to prevent scroll bleed -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute inset-0 bg-grid"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[400px] bg-brand-600/20 blur-[120px] rounded-[100%]"></div>
    </div>

    <!-- Main Container -->
    <main class="relative z-10 w-full max-w-2xl flex flex-col items-center">
        
        <!-- Header (Starts Hidden for Boot Sequence) -->
        <div id="mainHeader" class="text-center mb-10 opacity-0">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-dark-border bg-dark-card/50 text-xs font-mono text-gray-400 mb-6 backdrop-blur-md">
                <span class="w-2 h-2 rounded-full bg-brand-400 animate-pulse-glow"></span>
                v2.0.0 Engine Online
            </div>
            <h1 class="text-5xl font-semibold text-white tracking-tight mb-4">
                Trigger
            </h1>
            <p class="text-gray-400 text-lg max-w-md mx-auto">
                Permanent serverless heartbeat for your Render endpoints. Zero spin-down.
            </p>
        </div>

        <!-- The Input Box (Starts Hidden for Boot Sequence) -->
        <div id="mainContent" class="w-full max-w-xl opacity-0">
            <div class="animated-border-box transition-transform duration-300 hover:scale-[1.01]" id="inputContainer">
                <form id="triggerForm" class="relative bg-dark-card rounded-2xl flex items-center p-1.5 overflow-hidden">
                    <div class="pl-4 text-gray-500">
                        <i data-lucide="globe" class="w-5 h-5"></i>
                    </div>
                    <input 
                        type="url" 
                        id="renderUrl" 
                        required 
                        placeholder="https://api.your-project.onrender.com"
                        class="flex-1 min-w-0 bg-transparent border-none outline-none text-gray-200 placeholder-gray-600 py-3 px-4 text-base font-mono w-full"
                    >
                    <button 
                        type="submit" 
                        id="submitBtn"
                        class="bg-white text-black hover:bg-gray-200 font-medium py-2.5 px-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 group relative overflow-hidden min-w-[140px]"
                    >
                        <span id="btnText" class="relative z-10 flex items-center gap-2">
                            Deploy <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                        </span>
                        <i data-lucide="loader-2" id="loadingIcon" class="w-5 h-5 animate-spin hidden text-black relative z-10"></i>
                    </button>
                </form>
            </div>
        </div>

        <!-- Links Footer (Starts Hidden for Boot Sequence) -->
        <div id="mainFooter" class="mt-6 flex justify-center opacity-0">
            <a href="#" target="_blank" class="group flex items-center gap-2 px-5 py-2.5 rounded-full bg-dark-card/80 hover:bg-dark-border border border-dark-border/80 text-sm text-gray-400 hover:text-white transition-all backdrop-blur-sm">
                <i data-lucide="code-2" class="w-4 h-4 text-brand-400"></i>
                <span>Create this for your projects</span>
                <i data-lucide="arrow-up-right" class="w-3.5 h-3.5 group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform opacity-50 group-hover:opacity-100"></i>
            </a>
        </div>

        <!-- Success Dashboard -->
        <div id="successDashboard" class="w-full max-w-xl mt-6 hidden opacity-0 transition-opacity duration-500">
            <div class="bg-dark-card border border-dark-border rounded-2xl p-6 flex flex-col relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-brand-500 to-transparent opacity-50"></div>
                
                <div class="flex items-start justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-green-500/10 flex items-center justify-center border border-green-500/20">
                            <i data-lucide="check" class="w-5 h-5 text-green-400"></i>
                        </div>
                        <div>
                            <h3 class="text-white font-medium">Instance Secured</h3>
                            <p class="text-xs font-mono text-gray-500" id="displayUrl">...</p>
                        </div>
                    </div>
                    <span class="text-xs font-mono text-green-400 bg-green-400/10 px-2 py-1 rounded border border-green-400/20">Active</span>
                </div>

                <div class="grid grid-cols-3 gap-4 border-t border-dark-border pt-4">
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Ping Interval</p>
                        <p class="text-sm font-mono text-gray-300">14 Mins</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Protocol</p>
                        <p class="text-sm font-mono text-gray-300">HTTPS GET</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Status</p>
                        <p class="text-sm font-mono text-brand-400 flex items-center gap-1">
                            <span class="w-1.5 h-1.5 rounded-full bg-brand-400 animate-pulse"></span>
                            Monitoring
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script type="text/javascript">
        // Safe standard Javascript Syntax (No Arrow functions or Backticks)
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();

            // --- BOOT SEQUENCE LOGIC ---
            // After exactly 1.2s (the time it takes for the clock to draw 1 full circle)
            setTimeout(function() {
                var splash = document.getElementById('splashScreen');
                // Fade out the splash screen
                splash.style.opacity = '0';
                
                // Trigger the main UI slide-up animations
                document.getElementById('mainHeader').classList.add('animate-slide-up-1');
                document.getElementById('mainContent').classList.add('animate-slide-up-2');
                document.getElementById('mainFooter').classList.add('animate-slide-up-3');
                
                // Remove splash screen from DOM flow after fade transition
                setTimeout(function() {
                    splash.style.display = 'none';
                }, 500); 

            }, 1200); // 1.2s clock duration

            // --- FORM LOGIC ---
            var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwbkrzymicKVgbs2L0YMQuN6i6wY8LQR3RMhnqkpYcTe5EwoOPG-JkdJzjR8l2ac2Ar/exec'; 

            var form = document.getElementById('triggerForm');
            var inputContainer = document.getElementById('inputContainer');
            var submitBtn = document.getElementById('submitBtn');
            var btnText = document.getElementById('btnText');
            var loadingIcon = document.getElementById('loadingIcon');
            var successDashboard = document.getElementById('successDashboard');
            var displayUrl = document.getElementById('displayUrl');

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                var urlInput = document.getElementById('renderUrl').value;

                submitBtn.disabled = true;
                document.getElementById('renderUrl').disabled = true;
                btnText.classList.add('hidden');
                loadingIcon.classList.remove('hidden');
                
                inputContainer.style.opacity = '0.7';
                successDashboard.classList.add('hidden');
                successDashboard.classList.remove('opacity-100');

                var startTime = Date.now();

                fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                }).then(function() {
                    var elapsedTime = Date.now() - startTime;
                    var remainingTime = Math.max(0, 1500 - elapsedTime);

                    setTimeout(function() {
                        inputContainer.style.opacity = '1';
                        
                        submitBtn.classList.remove('bg-white', 'text-black', 'hover:bg-gray-200');
                        submitBtn.classList.add('bg-green-500', 'text-white');
                        loadingIcon.classList.add('hidden');
                        btnText.innerHTML = 'Deployed <i data-lucide="check-circle" class="w-4 h-4"></i>';
                        btnText.classList.remove('hidden');
                        
                        lucide.createIcons();

                        var urlObj = new URL(urlInput);
                        displayUrl.textContent = urlObj.hostname; 
                        
                        successDashboard.classList.remove('hidden');
                        setTimeout(function() {
                            successDashboard.classList.add('opacity-100', 'animate-slide-up-1');
                        }, 50);

                        setTimeout(function() {
                            resetForm();
                        }, 4000);

                    }, remainingTime);

                }).catch(function(err) {
                    btnText.innerHTML = 'Failed';
                    btnText.classList.remove('hidden');
                    loadingIcon.classList.add('hidden');
                    submitBtn.classList.add('bg-red-500', 'text-white');
                    submitBtn.disabled = false;
                    document.getElementById('renderUrl').disabled = false;
                    inputContainer.style.opacity = '1';
                    setTimeout(function() {
                        resetForm();
                    }, 3000);
                });
            });

            function resetForm() {
                document.getElementById('triggerForm').reset();
                document.getElementById('renderUrl').disabled = false;
                submitBtn.disabled = false;
                
                submitBtn.classList.remove('bg-green-500', 'bg-red-500', 'text-white');
                submitBtn.classList.add('bg-white', 'text-black', 'hover:bg-gray-200');
                btnText.innerHTML = 'Deploy <i data-lucide="arrow-right" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>';
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
